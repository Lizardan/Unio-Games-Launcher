name: Auto Build and Release Launcher

on:
  push:
    branches: [ main, master ]

jobs:
  # 1. Вычисляем НОВУЮ версию
  bump_version:
    name: Calculate next version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Calculate next patch version
        id: set_version
        run: |
          CURRENT=$(grep -Po 'bundleVersion: \K.+' ProjectSettings/ProjectSettings.asset)
          echo "Current version: $CURRENT"
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          echo "Next version: $NEW_VERSION"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

  # 2. Собираем проект, предварительно записав новую версию в файл
  build:
    name: Build for Windows
    needs: bump_version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.bump_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Replace version in ProjectSettings
        run: |
          NEW_VERSION="${{ needs.bump_version.outputs.version }}"
          sed -i "s/bundleVersion:.*/bundleVersion: $NEW_VERSION/" ProjectSettings/ProjectSettings.asset
          echo "Updated ProjectSettings.asset with version $NEW_VERSION"

      - name: Cache Library
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-${{ runner.os }}-

      - name: Build Unity project
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: Unio Games Launcher
          # version не передаём, она уже в файле

      - name: Zip the build
        run: |
          cd build/StandaloneWindows64
          zip -r ../../Launcher.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Launcher-${{ needs.bump_version.outputs.version }}
          path: Launcher.zip

  # 3. Публикуем релиз
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.build.outputs.version }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: Launcher-${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          files: Launcher.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 4. После релиза пушим новую версию в репозиторий
  update_version_in_repo:
    name: Update version in repository
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Commit new version to ProjectSettings
        run: |
          NEW_VERSION="${{ needs.release.outputs.version }}"
          sed -i "s/bundleVersion:.*/bundleVersion: $NEW_VERSION/" ProjectSettings/ProjectSettings.asset
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ProjectSettings/ProjectSettings.asset
          git commit -m "Set version to $NEW_VERSION [skip ci]"
          git push