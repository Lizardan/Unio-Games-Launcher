name: Auto Build and Release Launcher

on:
  push:
    branches: [ main, master ]

jobs:
  # 1. Определяем текущую версию (НЕ повышаем)
  get_version:
    name: Get current version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read current version
        id: get_version
        run: |
          CURRENT=$(grep -Po 'bundleVersion: \K.+' ProjectSettings/ProjectSettings.asset)
          echo "Current version: $CURRENT"
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

  # 2. Собираем проект с текущей версией
  build:
    name: Build for Windows
    needs: get_version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.get_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Cache Library
        uses: actions/cache@v5
        with:
          path: Library
          key: Library-${{ runner.os }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: Library-${{ runner.os }}-

      - name: Build Unity project
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: Unio Games Launcher
          # Версия будет автоматически взята из ProjectSettings (без явного указания version)

      - name: Zip the build
        run: |
          cd build/StandaloneWindows64
          zip -r ../../Launcher.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Launcher-${{ needs.get_version.outputs.version }}
          path: Launcher.zip

  # 3. Создаём релиз с текущей версией
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.build.outputs.version }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: Launcher-${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          files: Launcher.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 4. Повышаем версию для следующей сборки
  bump_version:
    name: Bump version for next build
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Bump patch version
        run: |
          CURRENT=$(grep -Po 'bundleVersion: \K.+' ProjectSettings/ProjectSettings.asset)
          IFS='.' read -r major minor patch <<< "$CURRENT"
          NEW_PATCH=$((patch + 1))
          NEW_VERSION="$major.$minor.$NEW_PATCH"
          sed -i "s/bundleVersion: $CURRENT/bundleVersion: $NEW_VERSION/" ProjectSettings/ProjectSettings.asset
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ProjectSettings/ProjectSettings.asset
          git commit -m "Bump version to $NEW_VERSION [skip ci]"
          git push