name: Auto Build and Release Launcher

on:
  push:
    branches: [ main, master ]

jobs:
  # 1. Генерируем новую версию на основе даты/времени
  generate_version:
    name: Generate version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gen_version.outputs.version }}
    steps:
      - name: Generate version from date
        id: gen_version
        run: |
          # Формат: 0.0.ГГММДДЧЧММ (без пробелов, всегда возрастает)
          VER="0.0.$(date -u +'%y%m%d%H%M')"
          echo "Generated version: $VER"
          echo "version=$VER" >> $GITHUB_OUTPUT

  # 2. Собираем проект
  build:
    name: Build for Windows
    needs: generate_version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.generate_version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      # ВАЖНО: НЕ используем Cache Library
      # Удаляем старую Library, если она осталась
      - name: Clean old Library
        run: rm -rf Library

      - name: Build Unity project
        uses: game-ci/unity-builder@v5
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          targetPlatform: StandaloneWindows64
          buildName: Unio Games Launcher
          version: ${{ needs.generate_version.outputs.version }}

      - name: Zip the build
        run: |
          cd build/StandaloneWindows64
          zip -r ../../Launcher.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: Launcher-${{ needs.generate_version.outputs.version }}
          path: Launcher.zip

  # 3. Публикуем релиз
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: Launcher-${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          files: Launcher.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}